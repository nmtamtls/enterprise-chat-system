# Bạn phải lấy Link Tunnel của Port 9000 trong tab Ports của VS Code
minio.external-url=https://tqgwvv8g-9001.asse.devtunnels.ms/
# 🔥 URL PUBLIC của Backend (Port 8082)
app.public-url=https://tqgwvv8g-8082.asse.devtunnels.ms/
